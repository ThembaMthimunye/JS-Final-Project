<!DOCTYPE html>
<html>
<head>
  <title>TravelBloom</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>
</head>

<body>
 <section>
    <nav class="bg-[#008B8B] flex items-center justify-center gap-[10rem] text-white p-3">

        <div class="flex font-bold gap-2">
            <h1>TB</h1>
            <p>TravelBloom</p>
        </div>
      
        <div class="flex gap-10">
            <a href="Home.html">Home</a>
            <a href="about.html">About</a>
            <a href="contactUs.html">Contact Us</a>
        </div>
      
        <div class="relative">
            <input 
              class="text-black rounded h-[2rem] pl-2 pr-28"
              type="text"
              placeholder="Enter a destination or keyword"
            >
      
            <div class="absolute right-1 top-1 flex gap-1">
                <button class="rounded bg-[#008B8B] text-white text-xs px-2">
                  Search
                </button>
      
                <button class="rounded bg-[#008B8B] text-white text-xs px-2">
                  Reset
                </button>
            </div>
        </div>
      
      </nav>
 </section>

 <section class=" text-white bg-[url(./bg.jpg)] bg-cover bg-center h-screen ">
     <
    <div class='flex gap-20 pt-20 justify-center items-center'>
        <div class="flex flex-col gap-6 ml-10 text-white font-bold mt-12">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <div>
            <h1 class="font-bold text-4xl">Explore Dream Destination</h1>
            <p class="max-w-xl">Contact us 
                </p>
        </div>
        <form class="w-[25rem] mt-10 p-6  rounded shadow-md bg-transparent">
  
  <div class="mb-4">
    <label for="name" class="block text-gray-700 font-semibold mb-2">Name</label>
    <input 
      type="text" 
      id="name" 
      name="name" 
      placeholder="Your Name" 
      class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 bg-transparent"
      required
    />
  </div>

  
  <div class="mb-4">
    <label for="email" class="block text-gray-700 font-semibold mb-2">Email</label>
    <input 
      type="email" 
      id="email" 
      name="email" 
      placeholder="your@email.com" 
      class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 bg-transparent"
      required
    />
  </div>

 
  <div class="mb-4">
    <label for="message" class="block text-gray-700 font-semibold mb-2">Message</label>
    <textarea 
      id="message" 
      name="message" 
      rows="5" 
      placeholder="Your message..." 
      class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 bg-transparent"
      required
    ></textarea>
  </div>

  <!-- Submit Button -->
  <button 
    type="submit" 
    class="w-full bg-[#008B8B] text-white font-bold p-2 rounded hover:bg-teal-700 transition-colors"
  >
    Send Message
  </button>
</form>
    </div>
    </section>


</body>
</html>
